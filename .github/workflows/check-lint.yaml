name: Check Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rye
        uses: eifinger/setup-rye@v4
        with:
          version: latest

      - name: Sync Rye environment
        run: rye sync

      - name: Check lint
        run: ./scripts/lint
